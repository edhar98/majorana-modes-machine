name: Compile Slides and Notes
on: [push]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Presentation Slides
        uses: xu-cheng/latex-action@v3
        with:
          root_file: presentation/**/slides.tex
          glob_root_file: true
          work_in_root_file_dir: true

      - name: Compile Notes
        uses: xu-cheng/latex-action@v3
        with:
          root_file: notes/*.tex
          glob_root_file: true
          work_in_root_file_dir: true

      - name: Organize PDFs and Site Indexes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p web_output/notes
          touch web_output/.nojekyll
          version="${GITHUB_SHA:-local}"

          find presentation -path "*/slides.pdf" | sort | while read -r file; do
            folder=$(basename "$(dirname "$file")")
            cp "$file" "web_output/${folder}.pdf"
          done

          find notes -maxdepth 1 -name "*.pdf" | sort | while read -r file; do
            cp "$file" "web_output/notes/$(basename "$file")"
          done

          # Showcase gallery images: copy the committed hero PNGs (full + thumb).
          mkdir -p web_output/img
          if ls plots/show_*.png >/dev/null 2>&1; then
            cp plots/show_*.png web_output/img/
          fi

          # ── Page head + hero band ────────────────────────────────────────────
          cat > web_output/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Majorana Modes in the Machine</title>
            <style>
              :root { color-scheme: light dark; }
              body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem auto; max-width: 1000px; padding: 0 1rem; line-height: 1.5; }
              h1 { margin-bottom: 0.25rem; }
              h2 { margin-top: 2.4rem; border-bottom: 1px solid #ccc; padding-bottom: 0.25rem; }
              ul { padding-left: 1.25rem; }
              li { margin: 0.35rem 0; }
              a { text-decoration: none; }
              a:hover { text-decoration: underline; }
              .muted { color: #888; }
              .thesis { font-size: 1.1rem; }
              /* White cards so figures render identically in light & dark themes. */
              .hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 1.25rem; margin: 1.5rem 0; }
              .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.25rem; }
              figure.card { margin: 0; background: #fff; border-radius: 10px; padding: 0.7rem; box-shadow: 0 1px 6px rgba(0,0,0,0.18); }
              figure.card img { width: 100%; height: auto; border-radius: 6px; display: block; }
              figure.card figcaption { font-size: 0.92rem; color: #333; margin-top: 0.55rem; }
              figure.card .links { font-size: 0.85rem; margin-top: 0.4rem; color: #555; }
            </style>
          </head>
          <body>
            <h1>Majorana Modes in the Machine</h1>
            <p class="muted">Advanced Seminar — AI-Augmented Theoretical Physics</p>
            <p class="thesis">Can a noisy (NISQ) quantum device still resolve the
              topological phase of a Kitaev chain? A nine-week study from the bulk
              physics of Majorana zero modes to circuit-level gate noise on a VQE.</p>
          HTML

          # ── Hero band: H1 (what a Majorana is) + H2 (the depth optimum) ──────
          if [ -f web_output/img/show_h1_majorana_wavefunction.png ]; then
            cat >> web_output/index.html <<HTML
            <div class="hero">
              <figure class="card">
                <a href="img/show_h1_majorana_wavefunction.png?v=${version}">
                  <img src="img/show_h1_majorana_wavefunction.png?v=${version}"
                       alt="Real-space Majorana zero-mode wavefunction"></a>
                <figcaption><strong>Where the Majorana lives.</strong> One fermion split
                  into two halves pinned to opposite ends of the wire — the topological
                  phase made visible.</figcaption>
              </figure>
              <figure class="card">
                <a href="img/show_h2_depth_optimum.png?v=${version}">
                  <img src="img/show_h2_depth_optimum.png?v=${version}"
                       alt="Optimal circuit depth under gate noise"></a>
                <figcaption><strong>The depth optimum.</strong> Deeper circuits express the
                  state better but accumulate gate noise; the measured signal peaks at a
                  finite, shallow depth.</figcaption>
              </figure>
            </div>
          HTML
          fi

          # ── "The story in figures" gallery ──────────────────────────────────
          cat >> web_output/index.html <<HTML
            <h2>The story in figures</h2>
            <div class="gallery">
              <figure class="card">
                <a href="img/show_h7_phase_banner.png?v=${version}">
                  <img src="img/show_h7_phase_banner.png?v=${version}"
                       alt="Kitaev chain phase diagram"></a>
                <figcaption><strong>The map.</strong> The bulk gap closes and the winding
                  number flips at \$\\mu=\\pm2t\$: the topological window in the middle.</figcaption>
                <div class="links"><a href="week1.pdf?v=${version}">Week 1 slides</a></div>
              </figure>
              <figure class="card">
                <a href="img/show_h3_transition_views.png?v=${version}">
                  <img src="img/show_h3_transition_views.png?v=${version}"
                       alt="The phase transition in three synchronized views"></a>
                <figcaption><strong>Crossing the transition.</strong> As \$\\mu\$ sweeps, the
                  gap closes, the d-vector loop slips off the origin, and the edge mode
                  lifts off zero — all at once.</figcaption>
                <div class="links"><a href="week1.pdf?v=${version}">Week 1 slides</a></div>
              </figure>
              <figure class="card">
                <a href="img/show_h4_edge_string.png?v=${version}">
                  <img src="img/show_h4_edge_string.png?v=${version}"
                       alt="The non-local edge string vs a local probe"></a>
                <figcaption><strong>A non-local probe.</strong> The edge string pierces the
                  whole chain and tracks the phase; no single-site measurement can see it.</figcaption>
                <div class="links"><a href="week6.pdf?v=${version}">Week 6 slides</a> ·
                  <a href="notes/measuring_topology_qiskit.pdf?v=${version}">note</a></div>
              </figure>
              <figure class="card">
                <a href="img/show_h5_parity_vs_topology.png?v=${version}">
                  <img src="img/show_h5_parity_vs_topology.png?v=${version}"
                       alt="Parity vs edge string under noise"></a>
                <figcaption><strong>Symmetry is not topology.</strong> Parity is exactly
                  conserved under dephasing, yet the non-local edge string still decays.</figcaption>
                <div class="links"><a href="week9.pdf?v=${version}">Week 9 slides</a> ·
                  <a href="notes/parity_topology_protection.pdf?v=${version}">note</a></div>
              </figure>
              <figure class="card">
                <a href="img/show_h6_coherent_vs_incoherent.png?v=${version}">
                  <img src="img/show_h6_coherent_vs_incoherent.png?v=${version}"
                       alt="Coherent rotation vs incoherent mixing"></a>
                <figcaption><strong>Rotation vs mixing.</strong> Coherent miscalibration keeps
                  the state pure (purity \$\\approx1\$); incoherent gate noise mixes it
                  (purity falls).</figcaption>
                <div class="links"><a href="week9.pdf?v=${version}">Week 9 slides</a></div>
              </figure>
              <figure class="card">
                <a href="img/show_h8_length_tradeoff.png?v=${version}">
                  <img src="img/show_h8_length_tradeoff.png?v=${version}"
                       alt="Chain-length tradeoff under noise"></a>
                <figcaption><strong>The length tradeoff.</strong> Longer chains protect the
                  qubit intrinsically but expose more sites and gates to noise — the two
                  effects pull opposite ways.</figcaption>
                <div class="links"><a href="notes/finite_size_majorana_splitting.pdf?v=${version}">note</a> ·
                  <a href="notes/majorana_splitting_vs_L.pdf?v=${version}">note</a></div>
              </figure>
            </div>
          HTML

          # ── Auto-generated reference lists (unchanged behaviour) ─────────────
          cat >> web_output/index.html <<'HTML'
            <h2>Presentations</h2>
            <ul>
          HTML

          find web_output -maxdepth 1 -name 'week*.pdf' | sort -V | while read -r file; do
            name=$(basename "$file" .pdf)
            label="Week ${name#week}"
            base=$(basename "$file")
            printf '              <li><a href="%s?v=%s">%s slides</a></li>\n' "$base" "$version" "$label" >> web_output/index.html
          done

          cat >> web_output/index.html <<'HTML'
            </ul>
            <h2>Notes</h2>
            <ul>
          HTML

          find web_output/notes -maxdepth 1 -name '*.pdf' | sort | while read -r file; do
            base=$(basename "$file")
            title=$(basename "$file" .pdf | tr '_' ' ')
            printf '              <li><a href="notes/%s?v=%s">%s</a></li>\n' "$base" "$version" "$title" >> web_output/index.html
          done

          cat >> web_output/index.html <<'HTML'
            </ul>
          </body>
          </html>
          HTML


      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web_output
